name: CodeQL

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  schedule:
    - cron: "17 4 * * 1"
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  security-events: write

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: "1"
  DOTNET_NOLOGO: "true"
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: "1"
  NUGET_PACKAGES: ${{ github.workspace }}/.nuget/packages

jobs:
  analyze:
    name: analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}-${{ matrix.language }}
      cancel-in-progress: true

    strategy:
      fail-fast: false
      matrix:
        include:
          - language: csharp
          - language: javascript-typescript

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        if: matrix.language == 'csharp'
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Cache NuGet packages
        if: matrix.language == 'csharp'
        uses: actions/cache@v4
        with:
          path: ${{ env.NUGET_PACKAGES }}
          key: ${{ runner.os }}-nuget-codeql-${{ hashFiles('global.json', 'Directory.Packages.props', 'NuGet.config', '**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-codeql-
            ${{ runner.os }}-nuget-

      - name: Initialize CodeQL for C#
        if: matrix.language == 'csharp'
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: manual

      - name: Initialize CodeQL for JavaScript and TypeScript
        if: matrix.language == 'javascript-typescript'
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}

      - name: Restore .NET
        if: matrix.language == 'csharp'
        run: dotnet restore DarkKitchen.slnx

      - name: Build .NET
        if: matrix.language == 'csharp'
        run: dotnet build DarkKitchen.slnx --no-restore -p:UseSharedCompilation=false -m:1 --verbosity minimal

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v4
